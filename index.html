<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🛸 GHOST TRACK · Remote UI</title>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        /* ----- RESET & BASE ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0f0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Courier New', monospace;
            padding: 20px;
        }

        /* ----- MAIN CARD ----- */
        .glass-panel {
            width: 100%;
            max-width: 1100px;
            background: rgba(10, 18, 10, 0.85);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 255, 100, 0.25);
            border-radius: 40px;
            padding: 30px 35px 40px;
            box-shadow: 0 25px 60px rgba(0, 255, 100, 0.08),
                0 0 0 1px rgba(0, 255, 100, 0.05) inset,
                0 0 40px rgba(0, 255, 100, 0.03);
            position: relative;
            overflow: hidden;
            transition: all 0.2s;
        }

        /* scan-line overlay */
        .glass-panel::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(0deg,
                    transparent,
                    transparent 2px,
                    rgba(0, 255, 100, 0.015) 2px,
                    rgba(0, 255, 100, 0.015) 4px);
            pointer-events: none;
            z-index: 5;
        }

        /* glitch border pulse */
        .glass-panel::after {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 40px;
            border: 1px solid transparent;
            background: linear-gradient(135deg, rgba(0, 255, 100, 0.2), transparent 50%, rgba(0, 255, 100, 0.1)) border-box;
            -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            animation: borderPulse 3s infinite alternate;
            z-index: 6;
        }

        @keyframes borderPulse {
            0% {
                opacity: 0.3;
            }
            100% {
                opacity: 1;
            }
        }

        /* ----- HEADER ----- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 15px;
            position: relative;
            z-index: 10;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo-icon {
            font-size: 2.2rem;
            color: #00ff88;
            filter: drop-shadow(0 0 12px #00ff8866);
            animation: iconPulse 2s infinite ease-in-out;
        }

        @keyframes iconPulse {
            0%,
            100% {
                transform: scale(1) rotate(0deg);
            }
            50% {
                transform: scale(1.05) rotate(2deg);
            }
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #00ff88, #00cc66);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px #00ff8833;
        }

        .logo-text small {
            font-weight: 300;
            font-size: 0.75rem;
            letter-spacing: 3px;
            -webkit-text-fill-color: rgba(0, 255, 136, 0.5);
            background: none;
            margin-left: 8px;
        }

        .status-badge {
            background: rgba(0, 255, 100, 0.08);
            border: 1px solid rgba(0, 255, 100, 0.25);
            border-radius: 60px;
            padding: 8px 20px;
            font-size: 0.8rem;
            color: #88ffbb;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(4px);
        }

        .status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #00ff88;
            border-radius: 50%;
            box-shadow: 0 0 20px #00ff88;
            animation: dotBlink 1.2s infinite;
        }

        @keyframes dotBlink {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.3;
                transform: scale(0.7);
            }
        }

        /* ----- GRID LAYOUT ----- */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 28px;
            position: relative;
            z-index: 10;
        }

        @media (max-width: 820px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }

        /* ----- MAP / TRACKING PANEL ----- */
        .map-panel {
            background: rgba(0, 20, 0, 0.5);
            border-radius: 28px;
            border: 1px solid rgba(0, 255, 100, 0.12);
            padding: 22px 22px 18px;
            backdrop-filter: blur(4px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            transition: all 0.3s;
        }

        .map-panel:hover {
            border-color: rgba(0, 255, 100, 0.3);
            box-shadow: 0 8px 40px rgba(0, 255, 100, 0.05);
        }

        .map-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            color: #66cc99;
            font-size: 0.8rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .map-header i {
            color: #00ff88;
            margin-right: 6px;
        }

        .map-container {
            width: 100%;
            aspect-ratio: 1/1;
            background: radial-gradient(ellipse at center, #0a1a0a 0%, #050a05 100%);
            border-radius: 20px;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(0, 255, 100, 0.08);
            box-shadow: inset 0 0 60px rgba(0, 255, 100, 0.02);
        }

        /* grid lines */
        .map-container .grid-line {
            position: absolute;
            background: rgba(0, 255, 100, 0.04);
        }
        .map-container .grid-line.h {
            width: 100%;
            height: 1px;
            top: 33%;
            left: 0;
        }
        .map-container .grid-line.h2 {
            top: 66%;
        }
        .map-container .grid-line.v {
            width: 1px;
            height: 100%;
            left: 33%;
            top: 0;
        }
        .map-container .grid-line.v2 {
            left: 66%;
        }

        /* pulse rings */
        .pulse-ring {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(0, 255, 100, 0.15);
            animation: ringExpand 4s infinite ease-out;
            pointer-events: none;
        }
        .pulse-ring.r1 {
            width: 40%;
            height: 40%;
            top: 30%;
            left: 30%;
            animation-delay: 0s;
        }
        .pulse-ring.r2 {
            width: 60%;
            height: 60%;
            top: 20%;
            left: 20%;
            animation-delay: 1.2s;
        }
        .pulse-ring.r3 {
            width: 80%;
            height: 80%;
            top: 10%;
            left: 10%;
            animation-delay: 2.4s;
        }

        @keyframes ringExpand {
            0% {
                transform: scale(0.6);
                opacity: 0.7;
            }
            100% {
                transform: scale(1.4);
                opacity: 0;
            }
        }

        /* tracking dot */
        .track-dot {
            position: absolute;
            width: 22px;
            height: 22px;
            background: radial-gradient(circle, #00ff88, #00aa55);
            border-radius: 50%;
            top: 48%;
            left: 52%;
            box-shadow: 0 0 40px #00ff88aa, 0 0 80px #00ff8844;
            transform: translate(-50%, -50%);
            transition: all 0.08s linear;
            z-index: 20;
            cursor: pointer;
        }
        .track-dot::after {
            content: '';
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            border: 2px solid rgba(0, 255, 100, 0.2);
            animation: dotRing 2s infinite;
        }
        @keyframes dotRing {
            0% {
                transform: scale(0.8);
                opacity: 1;
            }
            100% {
                transform: scale(1.8);
                opacity: 0;
            }
        }

        /* coordinate label */
        .coord-label {
            position: absolute;
            bottom: 16px;
            right: 20px;
            font-size: 0.7rem;
            color: rgba(0, 255, 136, 0.5);
            font-family: 'Courier New', monospace;
            letter-spacing: 1px;
            background: rgba(0, 10, 0, 0.6);
            padding: 4px 14px;
            border-radius: 30px;
            border: 1px solid rgba(0, 255, 100, 0.08);
            backdrop-filter: blur(2px);
            z-index: 25;
        }

        /* moving trail */
        .trail-dot {
            position: absolute;
            width: 5px;
            height: 5px;
            background: #00ff8866;
            border-radius: 50%;
            pointer-events: none;
            z-index: 15;
            filter: blur(1px);
            animation: trailFade 0.8s forwards;
        }
        @keyframes trailFade {
            0% {
                opacity: 0.8;
                transform: scale(1);
            }
            100% {
                opacity: 0;
                transform: scale(0.2);
            }
        }

        /* ----- REMOTE CONTROLS ----- */
        .remote-panel {
            background: rgba(0, 20, 0, 0.5);
            border-radius: 28px;
            border: 1px solid rgba(0, 255, 100, 0.12);
            padding: 22px 22px 18px;
            backdrop-filter: blur(4px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            gap: 18px;
            transition: all 0.3s;
        }

        .remote-panel:hover {
            border-color: rgba(0, 255, 100, 0.3);
        }

        .remote-title {
            font-size: 0.8rem;
            color: #66cc99;
            letter-spacing: 2px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid rgba(0, 255, 100, 0.06);
            padding-bottom: 12px;
        }

        .remote-title i {
            color: #00ff88;
        }

        .remote-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .remote-btn {
            background: rgba(0, 255, 100, 0.04);
            border: 1px solid rgba(0, 255, 100, 0.12);
            border-radius: 18px;
            padding: 18px 6px;
            color: #88ffbb;
            font-size: 0.8rem;
            font-weight: 500;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.25s ease;
            font-family: inherit;
            letter-spacing: 0.5px;
            backdrop-filter: blur(2px);
            position: relative;
            overflow: hidden;
        }

        .remote-btn i {
            font-size: 1.6rem;
            color: #00ff88;
            filter: drop-shadow(0 0 6px #00ff8844);
            transition: all 0.3s;
        }

        .remote-btn:hover {
            background: rgba(0, 255, 100, 0.1);
            border-color: #00ff88;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 255, 100, 0.08);
        }

        .remote-btn:active {
            transform: scale(0.95);
        }

        .remote-btn .badge {
            font-size: 0.55rem;
            background: rgba(0, 255, 100, 0.1);
            padding: 2px 10px;
            border-radius: 30px;
            color: #66cc99;
            border: 1px solid rgba(0, 255, 100, 0.06);
        }

        .remote-btn.danger:hover {
            border-color: #ff4466;
            background: rgba(255, 68, 102, 0.08);
        }
        .remote-btn.danger i {
            color: #ff4466;
            filter: drop-shadow(0 0 10px #ff446644);
        }

        .remote-btn.warning:hover {
            border-color: #ffaa44;
            background: rgba(255, 170, 68, 0.08);
        }
        .remote-btn.warning i {
            color: #ffaa44;
            filter: drop-shadow(0 0 10px #ffaa4444);
        }

        .remote-btn.success:hover {
            border-color: #44ffaa;
            background: rgba(68, 255, 170, 0.08);
        }

        /* ----- INFO ROW ----- */
        .info-row {
            display: flex;
            gap: 12px;
            margin-top: 4px;
            flex-wrap: wrap;
        }

        .info-chip {
            background: rgba(0, 255, 100, 0.04);
            border: 1px solid rgba(0, 255, 100, 0.06);
            border-radius: 60px;
            padding: 6px 18px;
            font-size: 0.7rem;
            color: #66cc99;
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1 1 auto;
            backdrop-filter: blur(2px);
            letter-spacing: 0.3px;
        }

        .info-chip i {
            color: #00ff88;
            font-size: 0.8rem;
        }

        .info-chip .value {
            color: #bbffdd;
            font-weight: 600;
            font-family: 'Courier New', monospace;
        }

        /* ----- ANIMATED SCANNER ----- */
        .scanner-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00ff88, transparent);
            top: 0;
            left: 0;
            opacity: 0.15;
            animation: scanMove 4s infinite linear;
            z-index: 2;
            pointer-events: none;
            filter: blur(1px);
        }
        @keyframes scanMove {
            0% {
                top: 0%;
                opacity: 0.05;
            }
            50% {
                opacity: 0.2;
            }
            100% {
                top: 100%;
                opacity: 0.05;
            }
        }

        /* ----- GLITCH TEXT ANIMATION ----- */
        .glitch-text {
            animation: glitch 3s infinite;
        }
        @keyframes glitch {
            0%,
            90%,
            100% {
                transform: translate(0);
            }
            92% {
                transform: translate(-2px, 1px);
            }
            94% {
                transform: translate(2px, -1px);
            }
            96% {
                transform: translate(-1px, 2px);
            }
            98% {
                transform: translate(1px, -2px);
            }
        }

        /* ----- RESPONSIVE TWEAKS ----- */
        @media (max-width: 480px) {
            .glass-panel {
                padding: 16px;
            }
            .remote-grid {
                grid-template-columns: 1fr 1fr;
                gap: 8px;
            }
            .remote-btn {
                padding: 14px 4px;
                font-size: 0.7rem;
            }
            .remote-btn i {
                font-size: 1.3rem;
            }
            .logo-text {
                font-size: 1.1rem;
            }
            .status-badge {
                font-size: 0.65rem;
                padding: 4px 14px;
            }
        }

        /* notification toast simulation */
        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 20, 0, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 255, 100, 0.2);
            padding: 14px 32px;
            border-radius: 60px;
            color: #bbffdd;
            font-size: 0.9rem;
            font-family: 'Courier New', monospace;
            letter-spacing: 1px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.7);
            z-index: 999;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            opacity: 0;
            transform: translateX(-50%) translateY(20px);
            pointer-events: none;
            white-space: nowrap;
        }

        .toast-msg.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast-msg i {
            margin-right: 12px;
            color: #00ff88;
        }
    </style>
</head>
<body>

    <!-- TOAST -->
    <div class="toast-msg" id="toast"><i class="fas fa-satellite-dish"></i> <span id="toastText">System ready</span></div>

    <!-- MAIN CARD -->
    <div class="glass-panel">

        <!-- scanner -->
        <div class="scanner-line"></div>

        <!-- HEADER -->
        <header class="header">
            <div class="logo-area">
                <div class="logo-icon"><i class="fas fa-ghost"></i></div>
                <div class="logo-text">
                    GHOST<span style="font-weight:300;">TRACK</span>
                    <small>v.2.4.1</small>
                </div>
            </div>
            <div class="status-badge">
                <span class="status-dot"></span>
                <span>LIVE · SECURE</span>
                <i class="fas fa-shield-alt" style="color:#00ff88;margin-left:4px;"></i>
            </div>
        </header>

        <!-- DASHBOARD -->
        <div class="dashboard-grid">

            <!-- MAP -->
            <div class="map-panel">
                <div class="map-header">
                    <span><i class="fas fa-map-pin"></i> Real-time tracking</span>
                    <span><i class="fas fa-sync-alt fa-fw"></i> <span id="updateTime">0.8</span>s</span>
                </div>
                <div class="map-container" id="mapContainer">
                    <!-- grid -->
                    <div class="grid-line h"></div>
                    <div class="grid-line h2"></div>
                    <div class="grid-line v"></div>
                    <div class="grid-line v2"></div>
                    <!-- pulse rings -->
                    <div class="pulse-ring r1"></div>
                    <div class="pulse-ring r2"></div>
                    <div class="pulse-ring r3"></div>

                    <!-- tracking dot -->
                    <div class="track-dot" id="trackDot"></div>

                    <!-- coords -->
                    <div class="coord-label" id="coordLabel">
                        <i class="fas fa-crosshairs" style="margin-right:6px;"></i>
                        <span id="latDisplay">-6.2088</span>°S · <span id="lngDisplay">106.8456</span>°E
                    </div>
                </div>
                <div class="info-row">
                    <div class="info-chip"><i class="fas fa-wifi"></i> Signal: <span class="value" id="signalLevel">92</span>%</div>
                    <div class="info-chip"><i class="fas fa-battery-three-quarters"></i> Device: <span class="value" id="batteryLevel">78</span>%</div>
                    <div class="info-chip"><i class="fas fa-phone"></i> <span class="value" id="deviceId">X9-7G2</span></div>
                </div>
            </div>

            <!-- REMOTE CONTROLS -->
            <div class="remote-panel">
                <div class="remote-title">
                    <i class="fas fa-gamepad"></i> Remote Commands
                    <span style="margin-left:auto;font-size:0.6rem;color:#446655;">encrypted</span>
                </div>

                <div class="remote-grid">
                    <button class="remote-btn success" data-action="lock">
                        <i class="fas fa-lock"></i>
                        Lock Device
                        <span class="badge">secure</span>
                    </button>
                    <button class="remote-btn" data-action="locate">
                        <i class="fas fa-satellite"></i>
                        Locate
                        <span class="badge">GPS</span>
                    </button>
                    <button class="remote-btn warning" data-action="alert">
                        <i class="fas fa-bell"></i>
                        Trigger Alert
                        <span class="badge">sound</span>
                    </button>
                    <button class="remote-btn danger" data-action="wipe">
                        <i class="fas fa-trash-alt"></i>
                        Wipe Data
                        <span class="badge">⚠️</span>
                    </button>
                    <button class="remote-btn" data-action="camera">
                        <i class="fas fa-camera"></i>
                        Snapshot
                        <span class="badge">capture</span>
                    </button>
                    <button class="remote-btn" data-action="vibrate">
                        <i class="fas fa-mobile-alt"></i>
                        Vibrate
                        <span class="badge">haptic</span>
                    </button>
                </div>

                <div class="info-row" style="margin-top:4px;">
                    <div class="info-chip" style="flex:1;">
                        <i class="fas fa-history"></i> Last cmd: <span class="value" id="lastCmd">—</span>
                    </div>
                    <div class="info-chip" style="flex:0 0 auto;">
                        <i class="fas fa-clock"></i> <span class="value" id="cmdTime">00:00</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- footer micro -->
        <div style="margin-top:28px;display:flex;justify-content:space-between;align-items:center;font-size:0.6rem;color:#335544;border-top:1px solid rgba(0,255,100,0.04);padding-top:16px;z-index:10;position:relative;flex-wrap:wrap;gap:8px;">
            <span><i class="fas fa-shield" style="margin-right:6px;"></i> end-to-end encrypted · anonymous session</span>
            <span><i class="fas fa-circle" style="color:#00ff88;font-size:0.4rem;margin-right:6px;"></i> <span id="sessionId">0x7F3A_9C2E</span></span>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // ----- DOM refs -----
            const dot = document.getElementById('trackDot');
            const latDisplay = document.getElementById('latDisplay');
            const lngDisplay = document.getElementById('lngDisplay');
            const signalEl = document.getElementById('signalLevel');
            const batteryEl = document.getElementById('batteryLevel');
            const deviceIdEl = document.getElementById('deviceId');
            const lastCmdEl = document.getElementById('lastCmd');
            const cmdTimeEl = document.getElementById('cmdTime');
            const updateTimeEl = document.getElementById('updateTime');
            const toast = document.getElementById('toast');
            const toastText = document.getElementById('toastText');
            const mapContainer = document.getElementById('mapContainer');

            // ----- state -----
            let pos = { x: 52, y: 48 }; // percent
            let target = { x: 52, y: 48 };
            let trail = [];
            const TRAIL_LENGTH = 18;

            // ----- helpers -----
            function random(min, max) { return Math.random() * (max - min) + min; }

            function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

            function showToast(msg, icon = 'fa-satellite-dish') {
                toastText.textContent = msg;
                toast.querySelector('i').className = 'fas ' + icon;
                toast.classList.add('show');
                clearTimeout(window.toastTimer);
                window.toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
            }

            // ----- update coordinates -----
            function updateCoords() {
                // simulate lat/lng from dot position
                const lat = -6.2 + (pos.y - 50) * 0.02;
                const lng = 106.8 + (pos.x - 50) * 0.025;
                latDisplay.textContent = lat.toFixed(4);
                lngDisplay.textContent = lng.toFixed(4);
            }

            // ----- move dot smoothly -----
            function moveDot() {
                // ease toward target
                const dx = target.x - pos.x;
                const dy = target.y - pos.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist > 0.3) {
                    const speed = 0.08 + Math.random() * 0.04;
                    pos.x += dx * speed;
                    pos.y += dy * speed;
                } else {
                    // set new target randomly
                    target.x = clamp(random(12, 88), 10, 90);
                    target.y = clamp(random(10, 88), 8, 92);
                    // update signal/battery randomly
                    signalEl.textContent = Math.floor(random(65, 99));
                    batteryEl.textContent = Math.floor(random(40, 98));
                }

                // apply position
                dot.style.left = pos.x + '%';
                dot.style.top = pos.y + '%';

                // trail
                const rect = mapContainer.getBoundingClientRect();
                const dotRect = dot.getBoundingClientRect();
                const cx = dotRect.left - rect.left + dotRect.width / 2;
                const cy = dotRect.top - rect.top + dotRect.height / 2;
                trail.push({ x: cx, y: cy });
                if (trail.length > TRAIL_LENGTH) trail.shift();

                // render trail
                const existing = mapContainer.querySelectorAll('.trail-dot');
                existing.forEach(el => el.remove());
                trail.forEach((p, i) => {
                    const el = document.createElement('div');
                    el.className = 'trail-dot';
                    const alpha = 0.5 * (i / trail.length);
                    el.style.left = (p.x / rect.width * 100) + '%';
                    el.style.top = (p.y / rect.height * 100) + '%';
                    el.style.opacity = alpha;
                    el.style.width = (3 + i * 0.4) + 'px';
                    el.style.height = (3 + i * 0.4) + 'px';
                    mapContainer.appendChild(el);
                });

                updateCoords();
                updateTimeEl.textContent = (2.5 + Math.random() * 1.2).toFixed(1);
            }

            // ----- remote actions -----
            function handleAction(action) {
                const now = new Date();
                const timeStr = now.toTimeString().slice(0, 5);
                cmdTimeEl.textContent = timeStr;

                const msgs = {
                    lock: ['Device locked 🔒', 'fa-lock'],
                    locate: ['GPS ping sent 📡', 'fa-satellite'],
                    alert: ['Alert triggered! 🚨', 'fa-bell'],
                    wipe: ['⚠️ Wipe command confirmed', 'fa-trash-alt'],
                    camera: ['📸 Snapshot captured', 'fa-camera'],
                    vibrate: ['📳 Vibrate signal sent', 'fa-mobile-alt']
                };

                const [msg, icon] = msgs[action] || ['Command sent', 'fa-bolt'];
                lastCmdEl.textContent = action.toUpperCase();
                showToast(msg, icon);

                // haptic feedback simulation
                if (action === 'vibrate') {
                    dot.style.transform = 'translate(-50%, -50%) scale(1.3)';
                    setTimeout(() => dot.style.transform = 'translate(-50%, -50%) scale(1)', 300);
                }

                if (action === 'wipe') {
                    // dramatic flash
                    document.querySelector('.glass-panel').style.boxShadow = '0 0 80px rgba(255,68,102,0.2)';
                    setTimeout(() => {
                        document.querySelector('.glass-panel').style.boxShadow = '';
                    }, 600);
                }

                if (action === 'locate') {
                    // ping animation
                    dot.style.boxShadow = '0 0 80px #00ff88, 0 0 160px #00ff8844';
                    setTimeout(() => {
                        dot.style.boxShadow = '0 0 40px #00ff88aa, 0 0 80px #00ff8844';
                    }, 500);
                }

                if (action === 'alert') {
                    // flash border
                    document.querySelector('.glass-panel').style.borderColor = '#ffaa44';
                    setTimeout(() => {
                        document.querySelector('.glass-panel').style.borderColor = 'rgba(0, 255, 100, 0.25)';
                    }, 400);
                }
            }

            // ----- bind buttons -----
            document.querySelectorAll('.remote-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.preventDefault();
                    const action = this.dataset.action;
                    if (action) handleAction(action);
                });
            });

            // ----- randomize device id -----
            function randomHex(len) {
                return Array.from({ length: len }, () =>
                    '0123456789ABCDEF' [Math.floor(Math.random() * 16)]
                ).join('');
            }
            deviceIdEl.textContent = randomHex(2) + '-' + randomHex(3) + randomHex(2);

            // ----- session id -----
            document.getElementById('sessionId').textContent = '0x' + randomHex(4) + '_' + randomHex(4);

            // ----- init loop -----
            function loop() {
                moveDot();
                // randomize target occasionally
                if (Math.random() < 0.02) {
                    target.x = clamp(random(10, 90), 8, 92);
                    target.y = clamp(random(8, 88), 6, 92);
                }
                requestAnimationFrame(loop);
            }

            // start
            loop();

            // ----- initial toast after 1s -----
            setTimeout(() => {
                showToast('System online · tracking active', 'fa-shield-alt');
            }, 800);

            // ----- click on dot = locate -----
            dot.addEventListener('click', () => {
                handleAction('locate');
            });

            // ----- double click map = random jump -----
            mapContainer.addEventListener('dblclick', (e) => {
                const rect = mapContainer.getBoundingClientRect();
                const x = ((e.clientX - rect.left) / rect.width) * 100;
                const y = ((e.clientY - rect.top) / rect.height) * 100;
                target.x = clamp(x, 5, 95);
                target.y = clamp(y, 5, 95);
                showToast('📍 Location jump', 'fa-map-pin');
            });

            // ----- keyboard shortcuts (demo) -----
            document.addEventListener('keydown', (e) => {
                const key = e.key.toLowerCase();
                const map = {
                    'l': 'lock',
                    'g': 'locate',
                    'a': 'alert',
                    'w': 'wipe',
                    'c': 'camera',
                    'v': 'vibrate'
                };
                if (map[key]) {
                    e.preventDefault();
                    handleAction(map[key]);
                }
            });

            console.log('🛸 GHOST TRACK · Remote UI active');
            console.log('⌨️  shortcuts: l=lock, g=locate, a=alert, w=wipe, c=camera, v=vibrate');
        })();
    </script>

</body>
</html>
