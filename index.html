<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🛸 GHOST TRACK · Galaxy UI</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    /* --- RESET --- */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* --- GALAXY BACKGROUND --- */
    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Courier New', monospace;
      padding: 20px;
      background: #05080a;
      overflow: hidden;
      position: relative;
    }

    /* Nebula layers */
    #galaxy-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: 
        radial-gradient(ellipse at 20% 50%, rgba(40, 0, 80, 0.4) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(0, 60, 40, 0.3) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, rgba(80, 0, 60, 0.2) 0%, transparent 40%),
        radial-gradient(ellipse at 10% 90%, rgba(0, 80, 100, 0.15) 0%, transparent 30%),
        radial-gradient(ellipse at 90% 70%, rgba(100, 0, 80, 0.2) 0%, transparent 40%),
        #05080a;
      pointer-events: none;
    }

    /* Stars container */
    #stars {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle var(--duration) ease-in-out infinite alternate;
      box-shadow: 0 0 2px rgba(255, 255, 255, 0.3);
    }

    @keyframes twinkle {
      0% { opacity: 0.2; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1.2); }
    }

    /* Shooting star */
    #shooting-star {
      position: fixed;
      width: 2px;
      height: 2px;
      background: white;
      border-radius: 50%;
      box-shadow: 0 0 6px 2px rgba(255,255,255,0.6);
      z-index: 1;
      pointer-events: none;
      opacity: 0;
      animation: shoot 8s infinite linear;
    }
    #shooting-star::after {
      content: '';
      position: absolute;
      top: 0;
      right: 0;
      width: 80px;
      height: 1px;
      background: linear-gradient(to left, rgba(255,255,255,0.8), transparent);
      transform: rotate(0deg);
      transform-origin: right center;
    }
    @keyframes shoot {
      0% { transform: translate(0, 0) rotate(-30deg); opacity: 0; }
      5% { opacity: 1; }
      15% { transform: translate(-400px, 200px) rotate(-30deg); opacity: 1; }
      20% { opacity: 0; }
      100% { opacity: 0; }
    }

    /* --- GLASS PANEL (di atas galaxy) --- */
    .glass-panel {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 1100px;
      background: rgba(10, 18, 10, 0.75);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(0, 255, 100, 0.2);
      border-radius: 40px;
      padding: 30px 35px 40px;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(0, 255, 100, 0.05) inset;
      overflow: hidden;
      transition: all 0.2s;
    }

    /* scan-line */
    .glass-panel::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(0deg,
          transparent, transparent 2px,
          rgba(0, 255, 100, 0.02) 2px,
          rgba(0, 255, 100, 0.02) 4px);
      pointer-events: none;
      z-index: 5;
    }

    .scanner-line {
      position: absolute;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, transparent, #00ff88, transparent);
      top: 0;
      left: 0;
      opacity: 0.12;
      animation: scanMove 4s infinite linear;
      z-index: 2;
      pointer-events: none;
    }
    @keyframes scanMove { 0% { top: 0%; opacity: 0.05; } 50% { opacity: 0.2; } 100% { top: 100%; opacity: 0.05; } }

    /* --- header, dll (sama seperti sebelumnya) --- */
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px; position: relative; z-index: 10; }
    .logo-area { display: flex; align-items: center; gap: 14px; }
    .logo-icon { font-size: 2.2rem; color: #00ff88; filter: drop-shadow(0 0 12px #00ff8866); animation: iconPulse 2s infinite ease-in-out; }
    @keyframes iconPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    .logo-text { font-size: 1.5rem; font-weight: 700; background: linear-gradient(135deg, #00ff88, #00cc66); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .logo-text small { font-weight: 300; font-size: 0.7rem; -webkit-text-fill-color: rgba(0, 255, 136, 0.5); margin-left: 8px; }
    .status-badge { background: rgba(0, 255, 100, 0.08); border: 1px solid rgba(0, 255, 100, 0.25); border-radius: 60px; padding: 8px 20px; font-size: 0.8rem; color: #88ffbb; display: flex; align-items: center; gap: 10px; backdrop-filter: blur(4px); }
    .status-dot { display: inline-block; width: 10px; height: 10px; background: #00ff88; border-radius: 50%; box-shadow: 0 0 20px #00ff88; animation: dotBlink 1.2s infinite; }
    @keyframes dotBlink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

    .target-input-area { background: rgba(0,20,0,0.5); border-radius: 60px; padding: 6px 6px 6px 20px; display: flex; align-items: center; gap: 10px; border: 1px solid rgba(0,255,100,0.1); margin-bottom: 20px; backdrop-filter: blur(2px); position: relative; z-index: 10; }
    .target-input-area i { color: #00ff88; }
    .target-input-area input { background: transparent; border: none; color: #bbffdd; font-family: 'Courier New', monospace; font-size: 0.9rem; padding: 10px 0; flex: 1; outline: none; letter-spacing: 1px; }
    .target-input-area input::placeholder { color: #446655; }
    .target-input-area .sim-label { background: rgba(255, 68, 102, 0.15); color: #ff6688; padding: 4px 14px; border-radius: 60px; font-size: 0.6rem; font-weight: bold; letter-spacing: 1px; border: 1px solid rgba(255,68,102,0.2); white-space: nowrap; }

    .dashboard-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 28px; position: relative; z-index: 10; }
    @media (max-width: 820px) { .dashboard-grid { grid-template-columns: 1fr; } }

    .map-panel { background: rgba(0, 20, 0, 0.5); border-radius: 28px; border: 1px solid rgba(0, 255, 100, 0.12); padding: 22px; backdrop-filter: blur(4px); }
    .map-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; color: #66cc99; font-size: 0.8rem; text-transform: uppercase; }
    .map-container { width: 100%; aspect-ratio: 1/1; background: radial-gradient(ellipse at center, #0a1a0a 0%, #050a05 100%); border-radius: 20px; position: relative; overflow: hidden; border: 1px solid rgba(0, 255, 100, 0.08); }
    .map-container .grid-line { position: absolute; background: rgba(0, 255, 100, 0.04); }
    .map-container .grid-line.h { width: 100%; height: 1px; top: 33%; left: 0; }
    .map-container .grid-line.h2 { top: 66%; }
    .map-container .grid-line.v { width: 1px; height: 100%; left: 33%; top: 0; }
    .map-container .grid-line.v2 { left: 66%; }
    .pulse-ring { position: absolute; border-radius: 50%; border: 1px solid rgba(0, 255, 100, 0.15); animation: ringExpand 4s infinite ease-out; pointer-events: none; }
    .pulse-ring.r1 { width: 40%; height: 40%; top: 30%; left: 30%; animation-delay: 0s; }
    .pulse-ring.r2 { width: 60%; height: 60%; top: 20%; left: 20%; animation-delay: 1.2s; }
    .pulse-ring.r3 { width: 80%; height: 80%; top: 10%; left: 10%; animation-delay: 2.4s; }
    @keyframes ringExpand { 0% { transform: scale(0.6); opacity: 0.7; } 100% { transform: scale(1.4); opacity: 0; } }

    .track-dot { position: absolute; width: 22px; height: 22px; background: radial-gradient(circle, #00ff88, #00aa55); border-radius: 50%; top: 48%; left: 52%; box-shadow: 0 0 40px #00ff88aa; transform: translate(-50%, -50%); transition: all 0.08s linear; z-index: 20; cursor: pointer; }
    .track-dot::after { content: ''; position: absolute; inset: -8px; border-radius: 50%; border: 2px solid rgba(0, 255, 100, 0.2); animation: dotRing 2s infinite; }
    @keyframes dotRing { 0% { transform: scale(0.8); opacity: 1; } 100% { transform: scale(1.8); opacity: 0; } }

    .coord-label { position: absolute; bottom: 16px; right: 20px; font-size: 0.7rem; color: rgba(0, 255, 136, 0.5); font-family: 'Courier New', monospace; background: rgba(0, 10, 0, 0.6); padding: 4px 14px; border-radius: 30px; border: 1px solid rgba(0, 255, 100, 0.08); z-index: 25; }
    .trail-dot { position: absolute; width: 5px; height: 5px; background: #00ff8866; border-radius: 50%; pointer-events: none; z-index: 15; filter: blur(1px); animation: trailFade 0.8s forwards; }
    @keyframes trailFade { 0% { opacity: 0.8; transform: scale(1); } 100% { opacity: 0; transform: scale(0.2); } }

    .remote-panel { background: rgba(0, 20, 0, 0.5); border-radius: 28px; border: 1px solid rgba(0, 255, 100, 0.12); padding: 22px; backdrop-filter: blur(4px); display: flex; flex-direction: column; gap: 18px; }
    .remote-title { font-size: 0.8rem; color: #66cc99; text-transform: uppercase; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid rgba(0, 255, 100, 0.06); padding-bottom: 12px; }
    .remote-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .remote-btn { background: rgba(0, 255, 100, 0.04); border: 1px solid rgba(0, 255, 100, 0.12); border-radius: 18px; padding: 18px 6px; color: #88ffbb; font-size: 0.8rem; display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; transition: all 0.25s ease; font-family: inherit; backdrop-filter: blur(2px); }
    .remote-btn i { font-size: 1.6rem; color: #00ff88; filter: drop-shadow(0 0 6px #00ff8844); }
    .remote-btn:hover { background: rgba(0, 255, 100, 0.1); border-color: #00ff88; transform: translateY(-2px); }
    .remote-btn:active { transform: scale(0.95); }
    .remote-btn .badge { font-size: 0.55rem; background: rgba(0, 255, 100, 0.1); padding: 2px 10px; border-radius: 30px; color: #66cc99; border: 1px solid rgba(0, 255, 100, 0.06); }
    .remote-btn.danger:hover { border-color: #ff4466; background: rgba(255, 68, 102, 0.08); }
    .remote-btn.danger i { color: #ff4466; }
    .remote-btn.warning:hover { border-color: #ffaa44; background: rgba(255, 170, 68, 0.08); }
    .remote-btn.warning i { color: #ffaa44; }

    .info-row { display: flex; gap: 12px; margin-top: 4px; flex-wrap: wrap; }
    .info-chip { background: rgba(0, 255, 100, 0.04); border: 1px solid rgba(0, 255, 100, 0.06); border-radius: 60px; padding: 6px 18px; font-size: 0.7rem; color: #66cc99; display: flex; align-items: center; gap: 8px; backdrop-filter: blur(2px); }
    .info-chip .value { color: #bbffdd; font-weight: 600; font-family: 'Courier New', monospace; }

    .toast-msg { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(0, 20, 0, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(0, 255, 100, 0.2); padding: 14px 32px; border-radius: 60px; color: #bbffdd; font-size: 0.9rem; font-family: 'Courier New', monospace; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.7); z-index: 999; transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); opacity: 0; transform: translateX(-50%) translateY(20px); pointer-events: none; white-space: nowrap; }
    .toast-msg.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast-msg i { margin-right: 12px; color: #00ff88; }

    .footer { margin-top: 28px; display: flex; justify-content: space-between; align-items: center; font-size: 0.6rem; color: #335544; border-top: 1px solid rgba(0,255,100,0.04); padding-top: 16px; position: relative; z-index: 10; flex-wrap: wrap; gap: 8px; }

    /* Responsive */
    @media (max-width: 480px) {
      .glass-panel { padding: 16px; }
      .remote-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
      .remote-btn { padding: 14px 4px; font-size: 0.7rem; }
      .remote-btn i { font-size: 1.3rem; }
      .logo-text { font-size: 1.1rem; }
      .status-badge { font-size: 0.65rem; padding: 4px 14px; }
    }
  </style>
</head>
<body>

  <!-- GALAXY BACKGROUND -->
  <div id="galaxy-bg"></div>
  <div id="stars"></div>
  <div id="shooting-star"></div>

  <!-- TOAST -->
  <div class="toast-msg" id="toast"><i class="fas fa-satellite-dish"></i> <span id="toastText">Siap</span></div>

  <!-- MAIN PANEL -->
  <div class="glass-panel">
    <div class="scanner-line"></div>

    <header class="header">
      <div class="logo-area">
        <div class="logo-icon"><i class="fas fa-ghost"></i></div>
        <div class="logo-text">GHOST<span style="font-weight:300;">TRACK</span> <small>GALAXY</small></div>
      </div>
      <div class="status-badge"><span class="status-dot"></span> LIVE · SIMULASI <i class="fas fa-shield-alt" style="color:#00ff88;margin-left:4px;"></i></div>
    </header>

    <div class="target-input-area">
      <i class="fas fa-phone-alt"></i>
      <input type="text" id="targetPhone" placeholder="Masukkan nomor target (contoh: +62 812-3456-7890)" value="+62 812-3456-7890">
      <span class="sim-label"><i class="fas fa-exclamation-triangle"></i> SIMULASI</span>
    </div>

    <div class="dashboard-grid">
      <div class="map-panel">
        <div class="map-header"><span><i class="fas fa-map-pin"></i> Real-time tracking</span> <span><i class="fas fa-sync-alt"></i> <span id="updateTime">0.8</span>s</span></div>
        <div class="map-container" id="mapContainer">
          <div class="grid-line h"></div><div class="grid-line h2"></div>
          <div class="grid-line v"></div><div class="grid-line v2"></div>
          <div class="pulse-ring r1"></div><div class="pulse-ring r2"></div><div class="pulse-ring r3"></div>
          <div class="track-dot" id="trackDot"></div>
          <div class="coord-label"><i class="fas fa-crosshairs" style="margin-right:6px;"></i> <span id="latDisplay">-6.2088</span>°S · <span id="lngDisplay">106.8456</span>°E</div>
        </div>
        <div class="info-row">
          <div class="info-chip"><i class="fas fa-wifi"></i> Sinyal: <span class="value" id="signalLevel">92</span>%</div>
          <div class="info-chip"><i class="fas fa-battery-three-quarters"></i> Baterai: <span class="value" id="batteryLevel">78</span>%</div>
          <div class="info-chip"><i class="fas fa-phone"></i> Target: <span class="value" id="deviceId">X9-7G2</span></div>
        </div>
      </div>

      <div class="remote-panel">
        <div class="remote-title"><i class="fas fa-gamepad"></i> Remote Commands <span style="margin-left:auto;font-size:0.6rem;color:#446655;">terenkripsi</span></div>
        <div class="remote-grid">
          <button class="remote-btn success" data-action="lock"><i class="fas fa-lock"></i> Lock <span class="badge">secure</span></button>
          <button class="remote-btn" data-action="locate"><i class="fas fa-satellite"></i> Locate <span class="badge">GPS</span></button>
          <button class="remote-btn warning" data-action="alert"><i class="fas fa-bell"></i> Alert <span class="badge">sound</span></button>
          <button class="remote-btn danger" data-action="wipe"><i class="fas fa-trash-alt"></i> Wipe <span class="badge">⚠️</span></button>
          <button class="remote-btn" data-action="camera"><i class="fas fa-camera"></i> Snapshot <span class="badge">capture</span></button>
          <button class="remote-btn" data-action="vibrate"><i class="fas fa-mobile-alt"></i> Vibrate <span class="badge">haptic</span></button>
        </div>
        <div class="info-row" style="margin-top:4px;">
          <div class="info-chip" style="flex:1;"><i class="fas fa-history"></i> Perintah terakhir: <span class="value" id="lastCmd">—</span></div>
          <div class="info-chip" style="flex:0 0 auto;"><i class="fas fa-clock"></i> <span class="value" id="cmdTime">00:00</span></div>
        </div>
      </div>
    </div>

    <div class="footer">
      <span><i class="fas fa-shield" style="margin-right:6px;"></i> end-to-end encrypted · sesi simulasi</span>
      <span><i class="fas fa-circle" style="color:#00ff88;font-size:0.4rem;margin-right:6px;"></i> <span id="sessionId">0x7F3A_9C2E</span></span>
    </div>
  </div>

  <script>
    (function() {
      // --- GENERATE STARS ---
      const starsContainer = document.getElementById('stars');
      const starCount = 400;
      for (let i = 0; i < starCount; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        const size = Math.random() * 2.5 + 0.5;
        star.style.width = size + 'px';
        star.style.height = size + 'px';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
        star.style.animationDelay = Math.random() * 5 + 's';
        star.style.opacity = Math.random() * 0.5 + 0.3;
        starsContainer.appendChild(star);
      }

      // --- DOM refs (sama seperti sebelumnya) ---
      const dot = document.getElementById('trackDot');
      const latDisplay = document.getElementById('latDisplay');
      const lngDisplay = document.getElementById('lngDisplay');
      const signalEl = document.getElementById('signalLevel');
      const batteryEl = document.getElementById('batteryLevel');
      const deviceIdEl = document.getElementById('deviceId');
      const lastCmdEl = document.getElementById('lastCmd');
      const cmdTimeEl = document.getElementById('cmdTime');
      const updateTimeEl = document.getElementById('updateTime');
      const toast = document.getElementById('toast');
      const toastText = document.getElementById('toastText');
      const mapContainer = document.getElementById('mapContainer');
      const targetPhoneInput = document.getElementById('targetPhone');

      let pos = { x: 52, y: 48 };
      let target = { x: 52, y: 48 };
      let trail = [];
      const TRAIL_LENGTH = 18;

      function random(min, max) { return Math.random() * (max - min) + min; }
      function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

      function getTargetNumber() {
        let val = targetPhoneInput.value.trim();
        if (!val) return 'Tidak ada nomor';
        return val;
      }

      function showToast(msg, icon = 'fa-satellite-dish') {
        toastText.textContent = msg;
        toast.querySelector('i').className = 'fas ' + icon;
        toast.classList.add('show');
        clearTimeout(window.toastTimer);
        window.toastTimer = setTimeout(() => toast.classList.remove('show'), 2600);
      }

      function updateCoords() {
        const lat = -6.2 + (pos.y - 50) * 0.02;
        const lng = 106.8 + (pos.x - 50) * 0.025;
        latDisplay.textContent = lat.toFixed(4);
        lngDisplay.textContent = lng.toFixed(4);
      }

      function moveDot() {
        const dx = target.x - pos.x;
        const dy = target.y - pos.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist > 0.3) {
          const speed = 0.08 + Math.random() * 0.04;
          pos.x += dx * speed;
          pos.y += dy * speed;
        } else {
          target.x = clamp(random(12, 88), 10, 90);
          target.y = clamp(random(10, 88), 8, 92);
          signalEl.textContent = Math.floor(random(65, 99));
          batteryEl.textContent = Math.floor(random(40, 98));
        }
        dot.style.left = pos.x + '%';
        dot.style.top = pos.y + '%';

        const rect = mapContainer.getBoundingClientRect();
        const dotRect = dot.getBoundingClientRect();
        const cx = dotRect.left - rect.left + dotRect.width / 2;
        const cy = dotRect.top - rect.top + dotRect.height / 2;
        trail.push({ x: cx, y: cy });
        if (trail.length > TRAIL_LENGTH) trail.shift();

        const existing = mapContainer.querySelectorAll('.trail-dot');
        existing.forEach(el => el.remove());
        trail.forEach((p, i) => {
          const el = document.createElement('div');
          el.className = 'trail-dot';
          const alpha = 0.5 * (i / trail.length);
          el.style.left = (p.x / rect.width * 100) + '%';
          el.style.top = (p.y / rect.height * 100) + '%';
          el.style.opacity = alpha;
          el.style.width = (3 + i * 0.4) + 'px';
          el.style.height = (3 + i * 0.4) + 'px';
          mapContainer.appendChild(el);
        });
        updateCoords();
        updateTimeEl.textContent = (2.5 + Math.random() * 1.2).toFixed(1);
      }

      function handleAction(action) {
        const targetNum = getTargetNumber();
        const now = new Date();
        const timeStr = now.toTimeString().slice(0, 5);
        cmdTimeEl.textContent = timeStr;

        const actionNames = {
          lock: 'LOCK', locate: 'LOCATE', alert: 'ALERT', wipe: 'WIPE', camera: 'SNAPSHOT', vibrate: 'VIBRATE'
        };
        lastCmdEl.textContent = actionNames[action] || action.toUpperCase();

        const msgs = {
          lock: [`🔒 Mengirim perintah LOCK ke ${targetNum}`, 'fa-lock'],
          locate: [`📡 Mengirim ping GPS ke ${targetNum}`, 'fa-satellite'],
          alert: [`🚨 Mengirim ALERT ke ${targetNum}`, 'fa-bell'],
          wipe: [`⚠️ Perintah WIPE dikirim ke ${targetNum} (SIMULASI)`, 'fa-trash-alt'],
          camera: [`📸 Mengirim perintah SNAPSHOT ke ${targetNum}`, 'fa-camera'],
          vibrate: [`📳 Mengirim VIBRATE ke ${targetNum}`, 'fa-mobile-alt']
        };
        const [msg, icon] = msgs[action] || ['Perintah dikirim', 'fa-bolt'];
        showToast(msg, icon);

        if (action === 'vibrate') {
          dot.style.transform = 'translate(-50%, -50%) scale(1.3)';
          setTimeout(() => dot.style.transform = 'translate(-50%, -50%) scale(1)', 300);
        }
        if (action === 'wipe') {
          document.querySelector('.glass-panel').style.boxShadow = '0 0 80px rgba(255,68,102,0.2)';
          setTimeout(() => document.querySelector('.glass-panel').style.boxShadow = '', 600);
        }
        if (action === 'locate') {
          dot.style.boxShadow = '0 0 80px #00ff88, 0 0 160px #00ff8844';
          setTimeout(() => dot.style.boxShadow = '0 0 40px #00ff88aa, 0 0 80px #00ff8844', 500);
        }
        if (action === 'alert') {
          document.querySelector('.glass-panel').style.borderColor = '#ffaa44';
          setTimeout(() => document.querySelector('.glass-panel').style.borderColor = 'rgba(0, 255, 100, 0.25)', 400);
        }
      }

      // Bind buttons
      document.querySelectorAll('.remote-btn').forEach(btn => {
        btn.addEventListener('click', function(e) {
          e.preventDefault();
          const action = this.dataset.action;
          if (action) handleAction(action);
        });
      });

      function randomHex(len) { return Array.from({ length: len }, () => '0123456789ABCDEF'[Math.floor(Math.random() * 16)]).join(''); }
      deviceIdEl.textContent = randomHex(2) + '-' + randomHex(3) + randomHex(2);
      document.getElementById('sessionId').textContent = '0x' + randomHex(4) + '_' + randomHex(4);

      function loop() {
        moveDot();
        if (Math.random() < 0.02) {
          target.x = clamp(random(10, 90), 8, 92);
          target.y = clamp(random(8, 88), 6, 92);
        }
        requestAnimationFrame(loop);
      }
      loop();

      setTimeout(() => showToast('🛸 Sistem simulasi siap · Masukkan nomor target', 'fa-shield-alt'), 800);

      dot.addEventListener('click', () => handleAction('locate'));

      mapContainer.addEventListener('dblclick', (e) => {
        const rect = mapContainer.getBoundingClientRect();
        const x = ((e.clientX - rect.left) / rect.width) * 100;
        const y = ((e.clientY - rect.top) / rect.height) * 100;
        target.x = clamp(x, 5, 95);
        target.y = clamp(y, 5, 95);
        showToast(`📍 Loncat ke koordinat (${target.x.toFixed(1)}, ${target.y.toFixed(1)})`, 'fa-map-pin');
      });

      document.addEventListener('keydown', (e) => {
        const key = e.key.toLowerCase();
        const map = { 'l': 'lock', 'g': 'locate', 'a': 'alert', 'w': 'wipe', 'c': 'camera', 'v': 'vibrate' };
        if (map[key]) { e.preventDefault(); handleAction(map[key]); }
      });

      console.log('🛸 GHOST TRACK · GALAXY SIMULASI');
      console.log('⌨️  shortcuts: l=lock, g=locate, a=alert, w=wipe, c=camera, v=vibrate');
    })();
  </script>
</body>
</html>
